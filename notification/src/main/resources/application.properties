spring.application.name=notification-service
server.port=${NOTIFICATION_SERVICE_PORT:8086}

jwt.secret=${JWT_SECRET}

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL}
eureka.client.register-with-eureka=${EUREKA_REGISTER_WITH_EUREKA}
eureka.client.fetch-registry=${EUREKA_FETCH_REGISTRY}
# Helps local/dev setups; safe to keep.
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP_ADDRESS}

spring.datasource.url=${NOTIFICATION_DB_URL}
spring.datasource.username=${NOTIFICATION_DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}

spring.jpa.hibernate.ddl-auto=${NOTIFICATION_JPA_DDL_AUTO}
spring.jpa.database-platform=${JPA_DATABASE_PLATFORM}
spring.jpa.show-sql=${NOTIFICATION_JPA_SHOW_SQL}

# -------- Kafka Broker --------
spring.kafka.bootstrap-servers=${NOTIFICATION_KAFKA_BOOTSTRAP_SERVERS}

# -------- Consumer --------
spring.kafka.consumer.group-id=${NOTIFICATION_KAFKA_CONSUMER_GROUP_ID}
spring.kafka.consumer.auto-offset-reset=${NOTIFICATION_KAFKA_CONSUMER_AUTO_OFFSET_RESET}

spring.kafka.consumer.key-deserializer=${KAFKA_CONSUMER_KEY_DESERIALIZER}
spring.kafka.consumer.value-deserializer=${KAFKA_CONSUMER_VALUE_DESERIALIZER}

spring.kafka.consumer.properties.spring.json.trusted.packages=${KAFKA_CONSUMER_JSON_TRUSTED_PACKAGES}
spring.kafka.consumer.properties.spring.json.use.type.headers=${KAFKA_CONSUMER_JSON_USE_TYPE_HEADERS}

# -------- Mail --------
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS_ENABLE}

# One-click security toggle (dev only): set false to disable security in this service
eventmate.security.enabled=${NOTIFICATION_SECURITY_ENABLED}
eventmate.internal.token=${INTERNAL_TOKEN}
