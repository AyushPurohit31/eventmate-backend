services:
  # ============================================================
  # DATABASES - PostgreSQL
  # ============================================================
  postgres-auth:
    image: postgres:15-alpine
    container_name: postgres-auth
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: eventmate-auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventmate-auth"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres-event:
    image: postgres:15-alpine
    container_name: postgres-event
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: eventmate-event
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-event-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d eventmate-event" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres-bookings:
      image: postgres:15-alpine
      container_name: postgres-bookings
      ports:
        - "5435:5432"
      environment:
        POSTGRES_DB: eventmate-bookings
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: ${DB_PASSWORD}
      volumes:
        - postgres-bookings-data:/var/lib/postgresql/data
      healthcheck:
        test: [ "CMD-SHELL", "pg_isready -U postgres -d eventmate-bookings" ]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 20s

  postgres-payment:
      image: postgres:15-alpine
      container_name: postgres-payment
      ports:
        - "5436:5432"
      environment:
        POSTGRES_DB: eventmate-payment
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: ${DB_PASSWORD}
      volumes:
        - postgres-payment-data:/var/lib/postgresql/data
      healthcheck:
        test: [ "CMD-SHELL", "pg_isready -U postgres -d eventmate-payment" ]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 20s

  postgres-notification:
      image: postgres:15-alpine
      container_name: postgres-notification
      ports:
        - "5437:5432"
      environment:
        POSTGRES_DB: eventmate-notification
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: ${DB_PASSWORD}
      volumes:
        - postgres-notification-data:/var/lib/postgresql/data
      healthcheck:
        test: [ "CMD-SHELL", "pg_isready -U postgres -d eventmate-notification" ]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 20s

  # ============================================================
  # INFRASTRUCTURE - Kafka
  # ============================================================
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      CLUSTER_ID: wzQf42E5Rh2lS9WfPd9ULA
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  # ============================================================
  # EUREKA SERVER
  # ============================================================
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "${EUREKA_SERVER_PORT}:${EUREKA_SERVER_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_SERVER_PORT: ${EUREKA_SERVER_PORT}
      EUREKA_SERVER_REGISTER_WITH_EUREKA: ${EUREKA_SERVER_REGISTER_WITH_EUREKA}
      EUREKA_SERVER_FETCH_REGISTRY: ${EUREKA_SERVER_FETCH_REGISTRY}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================================
  # GATEWAY
  # ============================================================
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GATEWAY_PORT: ${GATEWAY_PORT}
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      EUREKA_REGISTER_WITH_EUREKA: ${EUREKA_REGISTER_WITH_EUREKA}
      EUREKA_FETCH_REGISTRY: ${EUREKA_FETCH_REGISTRY}
      EUREKA_PREFER_IP_ADDRESS: ${EUREKA_PREFER_IP_ADDRESS}
      SECURITY_ENABLED: ${SECURITY_ENABLED}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
    depends_on:
      eureka-server:
        condition: service_healthy

  # ============================================================
  # AUTH SERVICE
  # ============================================================
  auth-service:
    build:
      context: ./auth
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "${AUTH_SERVICE_PORT}:${AUTH_SERVICE_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      AUTH_SERVICE_PORT: ${AUTH_SERVICE_PORT}
      AUTH_DB_URL: ${AUTH_DB_URL}
      AUTH_DB_USERNAME: ${AUTH_DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER: ${DB_DRIVER}
      AUTH_JPA_DDL_AUTO: ${AUTH_JPA_DDL_AUTO}
      AUTH_JPA_SHOW_SQL: ${AUTH_JPA_SHOW_SQL}
      JPA_DATABASE_PLATFORM: ${JPA_DATABASE_PLATFORM}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_JWT_EXPIRATION_MS: ${AUTH_JWT_EXPIRATION_MS}
      AUTH_JWT_REFRESH_TOKEN_EXPIRATION_MS: ${AUTH_JWT_REFRESH_TOKEN_EXPIRATION_MS}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      EUREKA_REGISTER_WITH_EUREKA: ${EUREKA_REGISTER_WITH_EUREKA}
      EUREKA_FETCH_REGISTRY: ${EUREKA_FETCH_REGISTRY}
      EUREKA_PREFER_IP_ADDRESS: ${EUREKA_PREFER_IP_ADDRESS}
      SECURITY_ENABLED: ${SECURITY_ENABLED}
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-auth:
        condition: service_healthy

  # ============================================================
  # TENANT SERVICE
  # ============================================================
  tenant-service:
    build:
      context: ./tenant
      dockerfile: Dockerfile
    container_name: tenant-service
    ports:
      - "${TENANT_SERVICE_PORT}:${TENANT_SERVICE_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TENANT_SERVICE_PORT: ${TENANT_SERVICE_PORT}
      TENANT_DB_URL: ${TENANT_DB_URL}
      TENANT_DB_USERNAME: ${TENANT_DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER: ${DB_DRIVER}
      TENANT_JPA_DDL_AUTO: ${TENANT_JPA_DDL_AUTO}
      TENANT_JPA_SHOW_SQL: ${TENANT_JPA_SHOW_SQL}
      JPA_DATABASE_PLATFORM: ${JPA_DATABASE_PLATFORM}
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      EUREKA_REGISTER_WITH_EUREKA: ${EUREKA_REGISTER_WITH_EUREKA}
      EUREKA_FETCH_REGISTRY: ${EUREKA_FETCH_REGISTRY}
      EUREKA_PREFER_IP_ADDRESS: ${EUREKA_PREFER_IP_ADDRESS}
      SECURITY_ENABLED: ${SECURITY_ENABLED}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-auth:
        condition: service_healthy

  # ============================================================
  # EVENT SERVICE
  # ============================================================
  event-service:
    build:
      context: ./event
      dockerfile: Dockerfile
    container_name: event-service
    ports:
      - "${EVENT_SERVICE_PORT}:${EVENT_SERVICE_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EVENT_SERVICE_PORT: ${EVENT_SERVICE_PORT}
      EVENT_DB_URL: ${EVENT_DB_URL}
      EVENT_DB_USERNAME: ${EVENT_DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER: ${DB_DRIVER}
      EVENT_JPA_DDL_AUTO: ${EVENT_JPA_DDL_AUTO}
      EVENT_JPA_SHOW_SQL: ${EVENT_JPA_SHOW_SQL}
      JPA_DATABASE_PLATFORM: ${JPA_DATABASE_PLATFORM}
      JWT_SECRET: ${JWT_SECRET}
      EVENT_REDIS_HOST: ${EVENT_REDIS_HOST}
      EVENT_REDIS_PORT: ${EVENT_REDIS_PORT}
      EVENT_REDIS_USERNAME: ${EVENT_REDIS_USERNAME}
      EVENT_REDIS_PASSWORD: ${EVENT_REDIS_PASSWORD}
      EVENT_KAFKA_BOOTSTRAP_SERVERS: ${EVENT_KAFKA_BOOTSTRAP_SERVERS}
      EVENT_KAFKA_CONSUMER_GROUP_ID: ${EVENT_KAFKA_CONSUMER_GROUP_ID}
      EVENT_KAFKA_CONSUMER_AUTO_OFFSET_RESET: ${EVENT_KAFKA_CONSUMER_AUTO_OFFSET_RESET}
      KAFKA_CONSUMER_KEY_DESERIALIZER: ${KAFKA_CONSUMER_KEY_DESERIALIZER}
      KAFKA_CONSUMER_VALUE_DESERIALIZER: ${KAFKA_CONSUMER_VALUE_DESERIALIZER}
      KAFKA_CONSUMER_JSON_TRUSTED_PACKAGES: ${KAFKA_CONSUMER_JSON_TRUSTED_PACKAGES}
      KAFKA_CONSUMER_JSON_USE_TYPE_HEADERS: ${KAFKA_CONSUMER_JSON_USE_TYPE_HEADERS}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      EUREKA_REGISTER_WITH_EUREKA: ${EUREKA_REGISTER_WITH_EUREKA}
      EUREKA_FETCH_REGISTRY: ${EUREKA_FETCH_REGISTRY}
      EUREKA_PREFER_IP_ADDRESS: ${EUREKA_PREFER_IP_ADDRESS}
      SECURITY_ENABLED: ${SECURITY_ENABLED}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-event:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ============================================================
  # BOOKING SERVICE
  # ============================================================
  booking-service:
    build:
      context: ./booking
      dockerfile: Dockerfile
    container_name: booking-service
    ports:
      - "${BOOKING_SERVICE_PORT}:${BOOKING_SERVICE_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      BOOKING_SERVICE_PORT: ${BOOKING_SERVICE_PORT}
      BOOKING_DB_URL: ${BOOKING_DB_URL}
      BOOKING_DB_USERNAME: ${BOOKING_DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER: ${DB_DRIVER}
      BOOKING_JPA_DDL_AUTO: ${BOOKING_JPA_DDL_AUTO}
      BOOKING_JPA_SHOW_SQL: ${BOOKING_JPA_SHOW_SQL}
      JPA_DATABASE_PLATFORM: ${JPA_DATABASE_PLATFORM}
      JWT_SECRET: ${JWT_SECRET}
      BOOKING_REDIS_HOST: ${BOOKING_REDIS_HOST}
      BOOKING_REDIS_PORT: ${BOOKING_REDIS_PORT}
      BOOKING_REDIS_USERNAME: ${BOOKING_REDIS_USERNAME}
      BOOKING_REDIS_PASSWORD: ${BOOKING_REDIS_PASSWORD}
      BOOKING_KAFKA_BOOTSTRAP_SERVERS: ${BOOKING_KAFKA_BOOTSTRAP_SERVERS}
      BOOKING_KAFKA_CONSUMER_GROUP_ID: ${BOOKING_KAFKA_CONSUMER_GROUP_ID}
      BOOKING_KAFKA_CONSUMER_AUTO_OFFSET_RESET: ${BOOKING_KAFKA_CONSUMER_AUTO_OFFSET_RESET}
      KAFKA_PRODUCER_KEY_SERIALIZER: ${KAFKA_PRODUCER_KEY_SERIALIZER}
      KAFKA_PRODUCER_VALUE_SERIALIZER: ${KAFKA_PRODUCER_VALUE_SERIALIZER}
      KAFKA_CONSUMER_KEY_DESERIALIZER: ${KAFKA_CONSUMER_KEY_DESERIALIZER}
      KAFKA_CONSUMER_VALUE_DESERIALIZER: ${KAFKA_CONSUMER_VALUE_DESERIALIZER}
      KAFKA_CONSUMER_JSON_TRUSTED_PACKAGES: ${KAFKA_CONSUMER_JSON_TRUSTED_PACKAGES}
      KAFKA_CONSUMER_JSON_USE_TYPE_HEADERS: ${KAFKA_CONSUMER_JSON_USE_TYPE_HEADERS}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      EUREKA_REGISTER_WITH_EUREKA: ${EUREKA_REGISTER_WITH_EUREKA}
      EUREKA_FETCH_REGISTRY: ${EUREKA_FETCH_REGISTRY}
      EUREKA_PREFER_IP_ADDRESS: ${EUREKA_PREFER_IP_ADDRESS}
      SECURITY_ENABLED: ${SECURITY_ENABLED}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-bookings:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ============================================================
  # PAYMENT SERVICE
  # ============================================================
  payment-service:
    build:
      context: ./payment
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "${PAYMENT_SERVICE_PORT}:${PAYMENT_SERVICE_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      PAYMENT_SERVICE_PORT: ${PAYMENT_SERVICE_PORT}
      PAYMENT_DB_URL: ${PAYMENT_DB_URL}
      PAYMENT_DB_USERNAME: ${PAYMENT_DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER: ${DB_DRIVER}
      PAYMENT_JPA_DDL_AUTO: ${PAYMENT_JPA_DDL_AUTO}
      PAYMENT_JPA_SHOW_SQL: ${PAYMENT_JPA_SHOW_SQL}
      JPA_DATABASE_PLATFORM: ${JPA_DATABASE_PLATFORM}
      JWT_SECRET: ${JWT_SECRET}
      PAYMENT_KAFKA_BOOTSTRAP_SERVERS: ${PAYMENT_KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_PRODUCER_KEY_SERIALIZER: ${KAFKA_PRODUCER_KEY_SERIALIZER}
      KAFKA_PRODUCER_VALUE_SERIALIZER: ${KAFKA_PRODUCER_VALUE_SERIALIZER}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      EUREKA_REGISTER_WITH_EUREKA: ${EUREKA_REGISTER_WITH_EUREKA}
      EUREKA_FETCH_REGISTRY: ${EUREKA_FETCH_REGISTRY}
      EUREKA_PREFER_IP_ADDRESS: ${EUREKA_PREFER_IP_ADDRESS}
      SECURITY_ENABLED: ${SECURITY_ENABLED}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-payment:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ============================================================
  # NOTIFICATION SERVICE
  # ============================================================
  notification-service:
    build:
      context: ./notification
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:${NOTIFICATION_SERVICE_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      NOTIFICATION_SERVICE_PORT: ${NOTIFICATION_SERVICE_PORT}
      NOTIFICATION_DB_URL: ${NOTIFICATION_DB_URL}
      NOTIFICATION_DB_USERNAME: ${NOTIFICATION_DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER: ${DB_DRIVER}
      NOTIFICATION_JPA_DDL_AUTO: ${NOTIFICATION_JPA_DDL_AUTO}
      NOTIFICATION_JPA_SHOW_SQL: ${NOTIFICATION_JPA_SHOW_SQL}
      JPA_DATABASE_PLATFORM: ${JPA_DATABASE_PLATFORM}
      JWT_SECRET: ${JWT_SECRET}
      NOTIFICATION_KAFKA_BOOTSTRAP_SERVERS: ${NOTIFICATION_KAFKA_BOOTSTRAP_SERVERS}
      NOTIFICATION_KAFKA_CONSUMER_GROUP_ID: ${NOTIFICATION_KAFKA_CONSUMER_GROUP_ID}
      NOTIFICATION_KAFKA_CONSUMER_AUTO_OFFSET_RESET: ${NOTIFICATION_KAFKA_CONSUMER_AUTO_OFFSET_RESET}
      KAFKA_CONSUMER_KEY_DESERIALIZER: ${KAFKA_CONSUMER_KEY_DESERIALIZER}
      KAFKA_CONSUMER_VALUE_DESERIALIZER: ${KAFKA_CONSUMER_VALUE_DESERIALIZER}
      KAFKA_CONSUMER_JSON_TRUSTED_PACKAGES: ${KAFKA_CONSUMER_JSON_TRUSTED_PACKAGES}
      KAFKA_CONSUMER_JSON_USE_TYPE_HEADERS: ${KAFKA_CONSUMER_JSON_USE_TYPE_HEADERS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_AUTH: ${SMTP_AUTH}
      SMTP_STARTTLS_ENABLE: ${SMTP_STARTTLS_ENABLE}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      EUREKA_REGISTER_WITH_EUREKA: ${EUREKA_REGISTER_WITH_EUREKA}
      EUREKA_FETCH_REGISTRY: ${EUREKA_FETCH_REGISTRY}
      EUREKA_PREFER_IP_ADDRESS: ${EUREKA_PREFER_IP_ADDRESS}
      SECURITY_ENABLED: ${SECURITY_ENABLED}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-notification:
        condition: service_healthy
      kafka:
        condition: service_healthy

# ============================================================
# VOLUMES - Named volumes for persistent data storage
# ============================================================
volumes:
  postgres-auth-data:
    driver: local
  postgres-event-data:
    driver: local
  postgres-bookings-data:
    driver: local
  postgres-payment-data:
    driver: local
  postgres-notification-data:
    driver: local
