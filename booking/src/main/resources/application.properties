spring.application.name=booking-service
server.port=${BOOKING_SERVICE_PORT:8084}

# ---- Eureka ----
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=${EUREKA_REGISTER_WITH_EUREKA:true}
eureka.client.fetch-registry=${EUREKA_FETCH_REGISTRY:true}
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP_ADDRESS:true}

# ---- Database ----
spring.datasource.url=${BOOKING_DB_URL:jdbc:postgresql://localhost:5432/eventmate-bookings}
spring.datasource.username=${BOOKING_DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# ---- JPA ----
spring.jpa.hibernate.ddl-auto=${BOOKING_JPA_DDL_AUTO:update}
spring.jpa.database-platform=${JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.show-sql=${BOOKING_JPA_SHOW_SQL:false}

# ---- Redis ----
spring.data.redis.host=${BOOKING_REDIS_HOST:localhost}
spring.data.redis.port=${BOOKING_REDIS_PORT:6379}
spring.data.redis.username=${BOOKING_REDIS_USERNAME}
spring.data.redis.password=${BOOKING_REDIS_PASSWORD}

# ---- Kafka ----
spring.kafka.bootstrap-servers=${BOOKING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${BOOKING_KAFKA_CONSUMER_GROUP_ID:booking-service}
spring.kafka.consumer.auto-offset-reset=${BOOKING_KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
spring.kafka.producer.key-serializer=${KAFKA_PRODUCER_KEY_SERIALIZER:org.apache.kafka.common.serialization.StringSerializer}
spring.kafka.producer.value-serializer=${KAFKA_PRODUCER_VALUE_SERIALIZER:org.springframework.kafka.support.serializer.JsonSerializer}
spring.kafka.consumer.key-deserializer=${KAFKA_CONSUMER_KEY_DESERIALIZER:org.apache.kafka.common.serialization.StringDeserializer}
spring.kafka.consumer.value-deserializer=${KAFKA_CONSUMER_VALUE_DESERIALIZER:org.springframework.kafka.support.serializer.JsonDeserializer}
spring.kafka.consumer.properties.spring.json.trusted.packages=${KAFKA_CONSUMER_JSON_TRUSTED_PACKAGES:*}
spring.kafka.consumer.properties.spring.json.use.type.headers=${KAFKA_CONSUMER_JSON_USE_TYPE_HEADERS:false}

# ---- JWT ----
jwt.secret=${JWT_SECRET}

# ---- Security (default ON - dev profile overrides to false) ----
eventmate.security.enabled=${SECURITY_ENABLED:true}

# ---- Internal token ----
eventmate.internal.token=${INTERNAL_TOKEN}