spring.application.name=booking-service
server.port=${BOOKING_SERVICE_PORT:8084}

jwt.secret=${JWT_SECRET}

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL}
eureka.client.register-with-eureka=${EUREKA_REGISTER_WITH_EUREKA}
eureka.client.fetch-registry=${EUREKA_FETCH_REGISTRY}
# Helps local/dev setups; safe to keep.
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP_ADDRESS}

spring.datasource.url=${BOOKING_DB_URL}
spring.datasource.username=${BOOKING_DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}

spring.jpa.hibernate.ddl-auto=${BOOKING_JPA_DDL_AUTO}
spring.jpa.database-platform=${JPA_DATABASE_PLATFORM}
spring.jpa.show-sql=${BOOKING_JPA_SHOW_SQL}

spring.data.redis.host=${BOOKING_REDIS_HOST}
spring.data.redis.port=${BOOKING_REDIS_PORT}
spring.data.redis.username=${BOOKING_REDIS_USERNAME}
spring.data.redis.password=${BOOKING_REDIS_PASSWORD}

# -------- Kafka Broker --------
spring.kafka.bootstrap-servers=${BOOKING_KAFKA_BOOTSTRAP_SERVERS}

# -------- Producer --------
spring.kafka.producer.key-serializer=${KAFKA_PRODUCER_KEY_SERIALIZER}
spring.kafka.producer.value-serializer=${KAFKA_PRODUCER_VALUE_SERIALIZER}

# -------- Consumer --------
spring.kafka.consumer.group-id=${BOOKING_KAFKA_CONSUMER_GROUP_ID}
spring.kafka.consumer.auto-offset-reset=${BOOKING_KAFKA_CONSUMER_AUTO_OFFSET_RESET}

spring.kafka.consumer.key-deserializer=${KAFKA_CONSUMER_KEY_DESERIALIZER}
spring.kafka.consumer.value-deserializer=${KAFKA_CONSUMER_VALUE_DESERIALIZER}

spring.kafka.consumer.properties.spring.json.trusted.packages=${KAFKA_CONSUMER_JSON_TRUSTED_PACKAGES}
spring.kafka.consumer.properties.spring.json.use.type.headers=${KAFKA_CONSUMER_JSON_USE_TYPE_HEADERS}
spring.kafka.consumer.properties.spring.json.value.default.type=com.eventmate.booking.dto.PaymentEvent

# One-click security toggle (dev only): set false to disable security in this service
eventmate.security.enabled=${BOOKING_SECURITY_ENABLED}
eventmate.internal.token=${INTERNAL_TOKEN}
