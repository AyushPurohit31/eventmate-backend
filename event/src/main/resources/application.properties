spring.application.name=event-service
server.port=${EVENT_SERVICE_PORT:8083}

# ---- Eureka ----
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=${EUREKA_REGISTER_WITH_EUREKA:true}
eureka.client.fetch-registry=${EUREKA_FETCH_REGISTRY:true}
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP_ADDRESS:true}

# ---- Database ----
spring.datasource.url=${EVENT_DB_URL:jdbc:postgresql://localhost:5432/eventmate-event}
spring.datasource.username=${EVENT_DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# ---- JPA ----
spring.jpa.hibernate.ddl-auto=${EVENT_JPA_DDL_AUTO:update}
spring.jpa.database-platform=${JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.show-sql=${EVENT_JPA_SHOW_SQL:false}

# ---- Redis ----
spring.data.redis.host=${EVENT_REDIS_HOST:localhost}
spring.data.redis.port=${EVENT_REDIS_PORT:6379}
spring.data.redis.username=${EVENT_REDIS_USERNAME}
spring.data.redis.password=${EVENT_REDIS_PASSWORD}

# ---- Kafka ----
spring.kafka.bootstrap-servers=${EVENT_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${EVENT_KAFKA_CONSUMER_GROUP_ID:event-service}
spring.kafka.consumer.auto-offset-reset=${EVENT_KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.key-deserializer=${KAFKA_CONSUMER_KEY_DESERIALIZER:org.apache.kafka.common.serialization.StringDeserializer}
spring.kafka.consumer.value-deserializer=${KAFKA_CONSUMER_VALUE_DESERIALIZER:org.springframework.kafka.support.serializer.JsonDeserializer}
spring.kafka.consumer.properties.spring.json.trusted.packages=${KAFKA_CONSUMER_JSON_TRUSTED_PACKAGES:*}
spring.kafka.consumer.properties.spring.json.use.type.headers=${KAFKA_CONSUMER_JSON_USE_TYPE_HEADERS:false}

# ---- JWT ----
jwt.secret=${JWT_SECRET}

# ---- Security (default ON - dev profile overrides to false) ----
eventmate.security.enabled=${SECURITY_ENABLED:true}

# ---- Internal token ----
eventmate.internal.token=${INTERNAL_TOKEN}