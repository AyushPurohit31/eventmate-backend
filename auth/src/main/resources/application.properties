spring.application.name=auth-service
server.port=${AUTH_SERVICE_PORT:8081}

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL}
eureka.client.register-with-eureka=${EUREKA_REGISTER_WITH_EUREKA}
eureka.client.fetch-registry=${EUREKA_FETCH_REGISTRY}
# Helps local/dev setups; safe to keep.
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP_ADDRESS}

spring.datasource.url=${AUTH_DB_URL}
spring.datasource.username=${AUTH_DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}

spring.jpa.hibernate.ddl-auto=${AUTH_JPA_DDL_AUTO}
spring.jpa.database-platform=${JPA_DATABASE_PLATFORM}
spring.jpa.show-sql=${AUTH_JPA_SHOW_SQL}

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${AUTH_JWT_EXPIRATION_MS}
jwt.refresh-token-expiration-ms=${AUTH_JWT_REFRESH_TOKEN_EXPIRATION_MS}

eventmate.internal.token=${INTERNAL_TOKEN}

spring.mvc.static-path-pattern=/static/**
spring.web.resources.static-locations=classpath:/static/
