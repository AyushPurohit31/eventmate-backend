spring.application.name=auth-service
server.port=${AUTH_SERVICE_PORT:8081}

# ---- Eureka ----
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=${EUREKA_REGISTER_WITH_EUREKA:true}
eureka.client.fetch-registry=${EUREKA_FETCH_REGISTRY:true}
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP_ADDRESS:true}

# ---- Database ----
spring.datasource.url=${AUTH_DB_URL:jdbc:postgresql://localhost:5432/eventmate-auth}
spring.datasource.username=${AUTH_DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# ---- JPA ----
spring.jpa.hibernate.ddl-auto=${AUTH_JPA_DDL_AUTO:update}
spring.jpa.database-platform=${JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.show-sql=${AUTH_JPA_SHOW_SQL:false}

# ---- JWT ----
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${AUTH_JWT_EXPIRATION_MS}
jwt.refresh-token-expiration-ms=${AUTH_JWT_REFRESH_TOKEN_EXPIRATION_MS}

# ---- Security ----
eventmate.security.enabled=${SECURITY_ENABLED:true}

# ---- Internal token ----
eventmate.internal.token=${INTERNAL_TOKEN}

# ---- Static resources ----
spring.mvc.static-path-pattern=/static/**
spring.web.resources.static-locations=classpath:/static/